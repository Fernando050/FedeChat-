<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedChat - Sekirite ak Stil</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sedgwick+Ave+Display&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script defer src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

</head>
<body>

    <audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
    <audio id="ringtoneSound" src="https://assets.mixkit.co/active_storage/sfx/2813/2813-preview.mp3" loop preload="auto"></audio>

    <div class="glass-container active" id="authScreen">
        <h1 class="graffiti-logo">FedChat</h1>
        
        <div id="loginForm">
            <p class="subtitle">Konekte pou w antre nan zòn nan</p>
            <div class="input-group">
                <input type="text" id="loginId" placeholder="Antre ID ou">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Modpas ou">
            </div>
            <button class="btn graffiti-btn" id="loginBtn">Konekte</button>
            <p class="switch-text">Ou pa gen kont? <span id="showSignup">Kreye youn</span></p>
        </div>

        <div id="signupForm" style="display: none;">
            <p class="subtitle">Kreye yon ID inik pou kòmanse</p>
            <div class="input-group">
                <input type="text" id="signupId" placeholder="Kreye yon ID">
            </div>
            <div class="input-group">
                <input type="password" id="signupPassword" placeholder="Kreye yon modpas">
            </div>
            <button class="btn graffiti-btn" id="signupBtn">Anrejistre kont lan</button>
            <p class="switch-text">Ou gen kont deja? <span id="showLogin">Konekte la a</span></p>
        </div>
    </div>

    <div class="chat-container glass-container" id="chatScreen">
        
        <div class="chat-header">
            <div class="user-info">
                <span class="status-dot"></span>
                <span id="myIdDisplay" class="my-id-text">Konekte kòm: ...</span>
            </div>

            <div class="menu-container">
                <button class="menu-dots-btn" id="menuToggleBtn">&#8942;</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button id="themeBtn">Chanje Tèm</button>
                    <hr>
                    <div class="menu-setting">
                        <label for="soundToggle">Aktive Son</label>
                        <input type="checkbox" id="soundToggle" checked>
                    </div>
                    <div class="menu-setting">
                        <select id="soundSelect">
                            <option value="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3">Son 1 (Defo)</option>
                            <option value="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3">Son 2 (Kout)</option>
                            <option value="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">Son 3 (Dous)</option>
                        </select>
                    </div>
                    <hr>
                    <button id="editMsgBtn" class="disabled-menu-item">Modifye mesaj la</button>
                    <button id="deleteMsgBtn" class="disabled-menu-item">Efase mesaj la</button>
                    <hr>
                    <button id="logoutBtn" style="color: #ff4d4d;">Dekonekte</button>
                </div>
            </div>
        </div>

        <div id="callBtnContainer" style="display:none; text-align:center; padding-top: 10px; gap: 15px; justify-content: center;">
            <button class="btn" id="audioCallBtn" style="background: #ffcc00; color: black; font-weight: bold; padding: 5px 10px; font-size: 14px;">📞 Apèl Odyo</button>
            <button class="btn" id="videoCallBtn" style="background: #00ffcc; color: black; font-weight: bold; padding: 5px 10px; font-size: 14px;">📹 Apèl Videyo</button>
        </div>

        <div id="videoModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000;">
            
            <video id="remoteVideo" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1;"></video>
            
            <video id="localVideo" autoplay muted playsinline style="width: 100px; height: 150px; object-fit: cover; position: absolute; bottom: 110px; right: 20px; z-index: 2; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2);"></video>

            <div style="position: absolute; top: 30px; width: 100%; text-align: center; color: white; z-index: 3; font-family: sans-serif;">
                <div id="callStatus" style="font-weight: bold; font-size: 18px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Apèl ap chaje...</div>
                <div id="callTimer" style="font-size: 16px; margin-top: 5px; color: #00ffcc; text-shadow: 0 2px 4px rgba(0,0,0,0.8); display: none; font-weight: bold;">00:00</div>
            </div>

            <div style="position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 3; flex-wrap: wrap;">
                <button id="muteAudioBtn" class="btn" style="background: rgba(255,255,255,0.2); color: white; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; border: none; cursor: pointer;">🎤</button>
                <button id="toggleVideoBtn" class="btn" style="background: rgba(255,255,255,0.2); color: white; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; border: none; cursor: pointer;">📷</button>
                <button id="shareScreenBtn" class="btn" style="background: rgba(255,255,255,0.2); color: white; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; border: none; cursor: pointer;">🖥️</button>
                <button id="answerBtn" class="btn" style="display: none; background: #00ffcc; color: black; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; box-shadow: 0 0 15px #00ffcc; border: none; cursor: pointer;">📞</button>
                <button id="hangupBtn" class="btn" style="background: #ff4d4d; color: white; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; box-shadow: 0 0 15px #ff4d4d; border: none; cursor: pointer;">📵</button>
            </div>
        </div>

        <div class="connect-peer-box">
            <input type="text" id="peerIdInput" placeholder="Antre ID moun ou vle pale avè l la...">
            <button class="btn connect-btn" id="connectPeerBtn">Kòmanse Pale</button>
        </div>

        <div class="active-chat-info" id="activeChatInfo" style="display: none;">
            Ap pale ak: <span id="chattingWithDisplay" class="neon-text">...</span>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="system-message">Antre yon ID anlè a pou w kòmanse yon konvèsasyon sekirize.</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Ekri mesaj ou a..." disabled>
            <button class="btn send-btn" id="sendBtn" disabled>Voye</button>
        </div>
    </div>

    <script defer src="script.js"></script>
</body>
</html>
