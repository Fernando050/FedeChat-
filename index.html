<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedChat - Sécurité et Style</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sedgwick+Ave+Display&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script defer src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

    <audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div class="glass-container active" id="authScreen">
        <h1 class="graffiti-logo">FedChat</h1>
        
        <div id="loginForm">
            <p class="subtitle">Connectez-vous pour entrer dans la zone</p>
            <div class="input-group">
                <input type="text" id="loginId" placeholder="Entrez votre ID">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Votre mot de passe">
            </div>
            <button class="btn graffiti-btn" id="loginBtn">Se connecter</button>
            <p class="switch-text">Pas de compte ? <span id="showSignup">Créez-en un</span></p>
        </div>

        <div id="signupForm" style="display: none;">
            <p class="subtitle">Créez un ID unique pour commencer</p>
            <div class="input-group">
                <input type="text" id="signupId" placeholder="Créez un ID">
            </div>
            <div class="input-group">
                <input type="password" id="signupPassword" placeholder="Créez un mot de passe">
            </div>
            <button class="btn graffiti-btn" id="signupBtn">Créer le compte</button>
            <p class="switch-text">Vous avez déjà un compte ? <span id="showLogin">Connectez-vous ici</span></p>
        </div>
    </div>

    <div class="chat-container glass-container" id="chatScreen">
        <div class="chat-header">
            <div class="user-info">
                <span class="status-dot"></span>
                <span id="myIdDisplay" class="my-id-text">Connecté en tant que : ...</span>
            </div>
            
            <div class="menu-container">
                <button class="menu-dots-btn" id="menuToggleBtn">&#8942;</button>
                <div class="dropdown-menu" id="dropdownMenu">
                    <button id="themeBtn">Changer de thème</button>
                    <button id="editMsgBtn" class="disabled-menu-item">Modifier le message</button>
                    <button id="deleteMsgBtn" class="disabled-menu-item">Supprimer le message</button>
                    <hr>
                    <button id="logoutBtn" style="color: #ff4d4d;">Se déconnecter</button>
                </div>
            </div>
        </div>

        <div class="connect-peer-box">
            <input type="text" id="peerIdInput" placeholder="Entrez l'ID de la personne à contacter...">
            <button class="btn connect-btn" id="connectPeerBtn">Discuter</button>
        </div>

        <div class="active-chat-info" id="activeChatInfo" style="display: none;">
            Discussion avec : <span id="chattingWithDisplay" class="neon-text">...</span>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="system-message">Entrez un ID ci-dessus pour démarrer une conversation sécurisée.</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Écrivez votre message..." disabled>
            <button class="btn send-btn" id="sendBtn" disabled>Envoyer</button>
        </div>
    </div>

    <script defer src="script.js"></script>
</body>
</html>
